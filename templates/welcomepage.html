<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Imported Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&family=Jersey+25&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Fa-Icons -->
    <script
      src="https://kit.fontawesome.com/6d75f4ef37.js"
      crossorigin="anonymous"
    ></script>
    <!-- CSS file -->
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='normalize.css') }}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='welcomepage.css') }}"
    />
    <title>Primal Arcade Server</title>
  </head>
  <body>
  <!-- Main Content Container -->
  <div class="hero">
    <!-- TV Frame Section -->
    <section class="tv-section" aria-label="Server Information Display">
      <div class="tv-frame" id="frame">
        <div class="tv-screen-content">
          <header class="tv-header">
            <h1>PRIMAL ARCADE</h1>
            <p class="server-info loader-line">
              <span class="server-type">Semi-Realism Server</span>
              <span class="game-name">[Path of Titans]</span>
            </p>
          </header>
          
          <div class="terminal-loader" aria-label="System loading status">
            <div class="loader-line">Connecting to database...</div>
            <div class="loader-line">Retrieving stardust data... [▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓] 386 records</div>
            <div class="loader-line">Loading habitat information... COMPLETE</div>
            <div class="loader-line">Parsing mutation patterns... ██████████ 100%</div>
            <div class="loader-line">Data loaded successfully!</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Call to Action Section -->
    <section class="cta-section" aria-label="Enter Server">
      <a class="button" href="{{ url_for('page_main') }}" aria-label="Enter the server">
        <i class="fa-sharp fa-solid fa-chevron-right fa-fade" 
           style="--fa-animation-duration: 0.8s; --fa-fade-opacity: 0.4"
           aria-hidden="true"></i>
        <span>Enter</span>
      </a>
    </section>
  </div>
</body>
</html>
